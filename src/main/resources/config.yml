# Database
# type: SQLITE  → single server (recommended default)
# type: MYSQL   → multi-server / BungeeCord networks
database:
  type: SQLITE

  sqlite:
    file: homes.db

  mysql:
    host: localhost
    port: 3306
    database: homeforge
    username: root
    password: ''
    pool-size: 10
    connection-timeout: 30000
    max-lifetime: 1800000

# General
settings:
  # Set false to give all players unlimited homes (ignores limit permissions)
  use_permissions: true

  # Home limit when no homeforge.limit.N permission is present
  default_home_limit: 3

  # Home limit for homeforge.limit.* (wildcard permission)
  max_home_limit: 54

  # true  → all matching homeforge.limit.N permissions are added together
  # false → only the highest matching permission is used
  count_home_permission_limit_together: false

  # Seconds between /home uses (0 = disabled)
  command_cooldown_home: 0

  # Seconds players must stand still before teleporting (0 = instant)
  teleport_delay: 0
  teleport_delay_check_movement: true

  # Effects on teleport arrival
  sound_on_teleport: true
  particle_on_teleport: true

  # BungeeCord: set to this server's name in BungeeCord config.yml
  # Leave blank '' for single-server setups
  server_name: ''

# GUI
gui:
  title: '&8Your Homes'
  admin_title: '&8Homes of %player%'
  settings_title: '&8%name%'
  symbol_picker_title: '&8Choose Symbol'

# Messages
# Supports & color codes. Use %placeholder% as shown.
